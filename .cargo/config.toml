[build]
# Количество параллельных задач компиляции
# По умолчанию используется количество ядер CPU (оптимально)
# jobs = 16  # Можно указать вручную для ограничения

# Target directory
target-dir = "target"

[profile.release]
# Полный LTO для максимальной оптимизации межмодульных вызовов
lto = "fat"

# Один codegen unit для лучшей оптимизации (медленнее компиляция, быстрее выполнение)
codegen-units = 1

# Максимальная оптимизация
opt-level = 3

# Удалить debug символы для уменьшения размера
strip = true

# Abort вместо unwind — быстрее и меньше бинарник
panic = "abort"

[profile.release.build-override]
opt-level = 3

# Профиль production — для финальных релизов
[profile.production]
inherits = "release"
lto = "fat"
codegen-units = 1
opt-level = 3
strip = true
panic = "abort"

# Профиль optimized — с оптимизацией под конкретный CPU
[profile.optimized]
inherits = "release"
lto = "fat"
codegen-units = 1
opt-level = 3
strip = true
panic = "abort"

# Target-specific настройки
[target.x86_64-pc-windows-msvc]
linker = "rust-lld.exe"
rustflags = [
    "-C", "target-cpu=native",
    "-C", "link-arg=-fuse-ld=lld",
    "-C", "link-arg=-Wl,--gc-sections",
]

[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-C", "target-cpu=native",
    "-C", "link-arg=-fuse-ld=lld",
    "-C", "link-arg=-Wl,--gc-sections",
    "-C", "link-arg=-Wl,-O1",
]

# Настройки для Windows с MSVC
[target.x86_64-pc-windows-gnu]
rustflags = [
    "-C", "target-cpu=native",
]

# Настройки для Apple Silicon Mac
[target.aarch64-apple-darwin]
rustflags = [
    "-C", "target-cpu=native",
]

# Настройки для Intel Mac
[target.x86_64-apple-darwin]
rustflags = [
    "-C", "target-cpu=native",
]

[env]
# Оптимизация для rayon — использовать все ядра
RAYON_NUM_THREADS = "0"

# Настройки для blake3 — включить SIMD оптимизации
BLAKE3_SIMD = "1"
