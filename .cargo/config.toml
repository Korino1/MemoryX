[build]
# Количество параллельных задач компиляции
# По умолчанию используется количество ядер CPU (оптимально)
# jobs = 16  # Можно указать вручную для ограничения

# Target directory
target-dir = "target"

[profile.release]
# Полный LTO для максимальной оптимизации межмодульных вызовов
lto = "fat"

# Один codegen unit для лучшей оптимизации (медленнее компиляция, быстрее выполнение)
codegen-units = 1

# Максимальная оптимизация
opt-level = 3

# Удалить debug символы для уменьшения размера
strip = true

# Abort вместо unwind - быстрее и меньше бинарник
panic = "abort"

[profile.release.build-override]
opt-level = 3

# Профиль production - для финальных релизов
[profile.production]
inherits = "release"
lto = "fat"
codegen-units = 1
opt-level = 3
strip = true
panic = "abort"

# Профиль optimized - настройки профиля без привязки к CPU.
# CPU-specific builds задаются только явным RUSTFLAGS, см. docs/PORTABLE_CPU_BUILDS.md.
[profile.optimized]
inherits = "release"
lto = "fat"
codegen-units = 1
opt-level = 3
strip = true
panic = "abort"

# Target-specific настройки.
# Public/release builds must stay portable. Do not set target-cpu=native here:
# it can emit instructions only available on the build machine CPU. Use explicit
# RUSTFLAGS for local optimized builds instead; see docs/PORTABLE_CPU_BUILDS.md.
[target.x86_64-pc-windows-msvc]
linker = "rust-lld.exe"

[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-C", "link-arg=-fuse-ld=lld",
    "-C", "link-arg=-Wl,--gc-sections",
    "-C", "link-arg=-Wl,-O1",
]

# Настройки для Windows с MSVC
[target.x86_64-pc-windows-gnu]
rustflags = []

# Настройки для Apple Silicon Mac
[target.aarch64-apple-darwin]
rustflags = []

# Настройки для Intel Mac
[target.x86_64-apple-darwin]
rustflags = []

[env]
# Оптимизация для rayon - использовать все ядра
RAYON_NUM_THREADS = "0"

# Настройки для blake3 - включить SIMD оптимизации
BLAKE3_SIMD = "1"
